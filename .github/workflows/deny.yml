name: cargo-deny

on:
    push:
        branches: ["main", "dev"]
        paths:
            - "**/Cargo.toml"
            - "**/Cargo.lock"
            - "deny.toml"
            - ".github/workflows/deny.yml"
    pull_request:
        branches: ["main"]
        paths:
            - "**/Cargo.toml"
            - "**/Cargo.lock"
            - "deny.toml"
            - ".github/workflows/deny.yml"
    schedule:
        - cron: "0 6 * * 1"
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always

jobs:
    deny:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: EmbarkStudios/cargo-deny-action@v2
              with:
                  command: check
