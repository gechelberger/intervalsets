name: Rust

# Note: actions are referenced by tag for now; supply-chain hardening to
# SHA-pinning is tracked as a follow-up. dependabot is already configured to
# keep these current (.github/dependabot.yml).

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just fmt-check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,just
      - run: just test
      - name: Run doctests
        run: just test-doc

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just clippy

  no-std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install stable toolchain with nostd target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack,just
      - run: just check-no-std

  msrv-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87.0"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,just
      - run: just check-msrv

  check-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-criterion,just
      - run: just check-bench

  check-kani:
    runs-on: ubuntu-latest
    env:
      # Pin to match the local dev environment so "passes locally / fails
      # in CI" surprises stay rare. Bump alongside any harness changes.
      KANI_VERSION: 0.67.0
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: kani-verifier@${{ env.KANI_VERSION }},just
      - name: Cache CBMC backend
        uses: actions/cache@v5
        with:
          path: ~/.kani
          key: ${{ runner.os }}-kani-${{ env.KANI_VERSION }}
      - name: Kani setup (downloads CBMC on cache miss)
        run: cargo kani setup
      - run: just check-kani

  check-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just doc

  doc-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just doc-check

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@master

  # This is not really relevant until we hit an RC.
