name: Security audit

on:
  push:
    branches: [ "main" ]
    paths:
      - '**/Cargo.toml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/Cargo.toml'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-audit
          version: '^0.21'
      - run: cargo generate-lockfile
      - run: cargo audit
